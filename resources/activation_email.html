<body style="background: #f3f4f6; font-family: Arial, sans-serif; padding: 32px;">
    <table width="100%" cellpadding="0" cellspacing="0"
        style="max-width: 480px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <tr>
            <td style="padding: 32px 32px 16px 32px; text-align: left;">
                <h2 style="color: #222; margin-bottom: 12px; font-size: 22px; font-weight: 600;">Kích hoạt tài khoản
                </h2>
                <p style="color: #444; margin-bottom: 20px; font-size: 15px;">Cảm ơn bạn đã đăng ký. Vui lòng nhấn nút
                    bên dưới để kích hoạt tài khoản:</p>
                <a href="{{.ActivationLink}}"
                    style="display: inline-block; background: #0ea5e9; color: #fff; padding: 12px 28px; border-radius: 4px; text-decoration: none; font-size: 15px; font-weight: 500; margin-bottom: 18px;">Kích
                    hoạt tài khoản</a>
                <p style="color: #666; font-size: 13px; margin-top: 24px;">Nếu nút không hoạt động, hãy copy và dán link
                    sau vào trình duyệt:</p>
                <p style="word-break: break-all; color: #0ea5e9; font-size: 13px; margin: 0;">{{.ActivationLink}}</p>
            </td>
        </tr>
        <tr>
            <td style="padding: 0 32px 20px 32px; color: #aaa; font-size: 12px; text-align: left;">
                Nếu bạn không đăng ký tài khoản, hãy bỏ qua email này.
            </td>
        </tr>
    </table>
</body>
